events {}

http {
    include mime.types;

    server {
        listen 80;

        location / {
            root /var/www/html;
            try_files $uri $uri/ =404;
        }

        location /api/update {
            proxy_pass http://127.0.0.1:9000/update;
            proxy_set_header Host $host;
        }
    }
}